<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Asian Blooming Artists</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="admin-shell">
    <div class="container">
      <header class="admin-head">
        <p class="kicker">Admin</p>
        <h1>Submission Review</h1>
        <p class="section-intro">Use your admin token to review submissions, tag finalists/winners, and export CSV.</p>
      </header>

      <section class="panel">
        <div class="admin-tools">
          <input id="admin-token" type="password" placeholder="Enter ADMIN_TOKEN" autocomplete="off" />
          <button id="load-btn" class="btn btn-primary" type="button">Load Submissions</button>
          <button id="export-btn" class="btn btn-secondary" type="button">Export CSV</button>
          <a class="btn btn-secondary" href="/">Back to Site</a>
        </div>
        <p id="admin-status" class="form-status" role="status" aria-live="polite"></p>
        <div class="admin-table-wrap">
          <table class="admin-table" id="admin-table">
            <thead>
              <tr>
                <th>Submitted</th>
                <th>Artist</th>
                <th>Age</th>
                <th>School</th>
                <th>Email</th>
                <th>Title</th>
                <th>Dimensions</th>
                <th>Description</th>
                <th>Tag</th>
                <th>File</th>
              </tr>
            </thead>
            <tbody id="admin-tbody">
              <tr><td colspan="10">Enter token and click "Load Submissions".</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const tokenInput = document.getElementById('admin-token');
    const loadBtn = document.getElementById('load-btn');
    const exportBtn = document.getElementById('export-btn');
    const statusNode = document.getElementById('admin-status');
    const tbody = document.getElementById('admin-tbody');
    let currentToken = '';

    function setStatus(message, type) {
      statusNode.textContent = message;
      statusNode.className = `form-status ${type || ''}`.trim();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderRows(submissions) {
      if (!Array.isArray(submissions) || submissions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10">No submissions found.</td></tr>';
        return;
      }

      tbody.innerHTML = submissions.map((item) => {
        const submitted = new Date(item.submittedAt);
        const dateLabel = Number.isNaN(submitted.getTime()) ? 'Unknown' : submitted.toLocaleString();
        const safeUrl = encodeURI(String(item.fileUrl || ''));
        const tagLabel = item.finalistTier ? `<span class="submission-badge">${escapeHtml(item.finalistTier)}</span>` : '<small>Not tagged</small>';

        return `
          <tr>
            <td>${escapeHtml(dateLabel)}</td>
            <td>${escapeHtml(item.artistName)}</td>
            <td>${escapeHtml(item.artistAge)}</td>
            <td>${escapeHtml(item.artistSchool)}</td>
            <td>${escapeHtml(item.artistEmail)}</td>
            <td>${escapeHtml(item.artTitle)}</td>
            <td>${escapeHtml(item.artDimensions)}</td>
            <td>${escapeHtml(item.artDescription)}</td>
            <td>
              ${tagLabel}
              <div class="admin-tag-controls">
                <button type="button" class="btn btn-secondary admin-tag-btn" data-action="finalist" data-id="${item.id}">Finalist</button>
                <button type="button" class="btn btn-secondary admin-tag-btn" data-action="winner" data-id="${item.id}">Winner</button>
                <button type="button" class="btn btn-secondary admin-tag-btn" data-action="clear" data-id="${item.id}">Clear</button>
              </div>
            </td>
            <td><a href="${safeUrl}" target="_blank" rel="noopener">Open</a></td>
          </tr>
        `;
      }).join('');
    }

    async function loadSubmissions() {
      if (!currentToken) {
        setStatus('Enter your admin token first.', 'error');
        return;
      }

      loadBtn.disabled = true;
      setStatus('Loading submissions...');

      try {
        const response = await fetch('/api/admin/submissions', {
          headers: {
            'x-admin-token': currentToken,
          },
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Could not load submissions.');
        }

        renderRows(payload.submissions || []);
        setStatus(`Loaded ${(payload.submissions || []).length} submissions.`, 'success');
      } catch (error) {
        setStatus(error.message || 'Failed to load submissions.', 'error');
      } finally {
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener('click', async () => {
      currentToken = tokenInput.value.trim();
      await loadSubmissions();
    });

    exportBtn.addEventListener('click', () => {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus('Enter your admin token first.', 'error');
        return;
      }

      window.location.href = `/api/admin/submissions.csv?token=${encodeURIComponent(token)}`;
    });

    tbody.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement) || !target.classList.contains('admin-tag-btn')) return;

      const submissionId = Number.parseInt(target.dataset.id || '', 10);
      const action = target.dataset.action || '';
      if (!Number.isInteger(submissionId)) return;

      currentToken = tokenInput.value.trim();
      if (!currentToken) {
        setStatus('Enter your admin token first.', 'error');
        return;
      }

      target.disabled = true;
      try {
        if (action === 'clear') {
          const response = await fetch(`/api/admin/finalists/${submissionId}`, {
            method: 'DELETE',
            headers: { 'x-admin-token': currentToken },
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Could not clear tag.');
        } else {
          const tier = action === 'winner' ? 'Winner' : 'Finalist';
          const response = await fetch('/api/admin/finalists', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-admin-token': currentToken,
            },
            body: JSON.stringify({ submissionId, tier }),
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Could not update tag.');
        }

        await loadSubmissions();
      } catch (error) {
        setStatus(error.message || 'Tag update failed.', 'error');
      } finally {
        target.disabled = false;
      }
    });
  </script>
</body>
</html>
