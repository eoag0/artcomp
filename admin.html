<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Asian Blooming Artists</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="admin-shell">
    <div class="container">
      <header class="admin-head">
        <p class="kicker">Admin</p>
        <h1>Submission Review</h1>
        <p class="section-intro">Use your admin token to review submissions, tag finalists/winners, and export CSV.</p>
      </header>

      <section class="panel">
        <div class="admin-tools">
          <input id="admin-token" type="password" placeholder="Enter ADMIN_TOKEN" autocomplete="off" />
          <button id="load-btn" class="btn btn-primary" type="button">Load Submissions</button>
          <select id="sort-by">
            <option value="submitted">Sort: Newest</option>
            <option value="votes">Sort: Most Votes</option>
            <option value="title">Sort: Title</option>
            <option value="artist">Sort: Artist</option>
          </select>
          <select id="sort-dir">
            <option value="desc">Direction: Desc</option>
            <option value="asc">Direction: Asc</option>
          </select>
          <input id="filter-text" type="text" placeholder="Filter by ref, artist, school, email, title..." autocomplete="off" />
          <select id="filter-tag">
            <option value="all">Tag: All</option>
            <option value="untagged">Tag: Untagged</option>
            <option value="finalist">Tag: Finalist</option>
            <option value="winner">Tag: Winner</option>
          </select>
          <select id="filter-medium">
            <option value="all">Medium: All</option>
            <option value="2d">Medium: 2D</option>
            <option value="3d">Medium: 3D</option>
          </select>
          <button id="export-btn" class="btn btn-secondary" type="button">Export CSV</button>
          <a class="btn btn-secondary" href="/">Back to Site</a>
        </div>
        <p id="admin-status" class="form-status" role="status" aria-live="polite"></p>
        <div class="admin-table-wrap">
          <table class="admin-table" id="admin-table">
            <thead>
              <tr>
                <th>Ref #</th>
                <th>Submitted</th>
                <th>Artist</th>
                <th>Age</th>
                <th>School</th>
                <th>Email</th>
                <th>Title</th>
                <th>Dimensions</th>
                <th>3D</th>
                <th>AI</th>
                <th>Description</th>
                <th>Votes</th>
                <th>Tag</th>
                <th>File Name</th>
                <th>File Type</th>
                <th>File</th>
              </tr>
            </thead>
            <tbody id="admin-tbody">
              <tr><td colspan="16">Enter token and click "Load Submissions".</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const tokenInput = document.getElementById('admin-token');
    const loadBtn = document.getElementById('load-btn');
    const exportBtn = document.getElementById('export-btn');
    const sortByInput = document.getElementById('sort-by');
    const sortDirInput = document.getElementById('sort-dir');
    const filterTextInput = document.getElementById('filter-text');
    const filterTagInput = document.getElementById('filter-tag');
    const filterMediumInput = document.getElementById('filter-medium');
    const statusNode = document.getElementById('admin-status');
    const tbody = document.getElementById('admin-tbody');
    let currentToken = '';
    let allSubmissions = [];

    function setStatus(message, type) {
      statusNode.textContent = message;
      statusNode.className = `form-status ${type || ''}`.trim();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function applyFilters(submissions) {
      const query = String(filterTextInput ? filterTextInput.value : '').trim().toLowerCase();
      const tagFilter = String(filterTagInput ? filterTagInput.value : 'all').toLowerCase();
      const mediumFilter = String(filterMediumInput ? filterMediumInput.value : 'all').toLowerCase();

      return (Array.isArray(submissions) ? submissions : []).filter((item) => {
        const tagValue = String(item.finalistTier || '').toLowerCase();
        const isWinner = tagValue === 'winner';
        const isFinalist = tagValue === 'finalist';
        const isTagged = Boolean(tagValue);

        if (tagFilter === 'winner' && !isWinner) return false;
        if (tagFilter === 'finalist' && !isFinalist) return false;
        if (tagFilter === 'untagged' && isTagged) return false;

        if (mediumFilter === '2d' && item.is3D) return false;
        if (mediumFilter === '3d' && !item.is3D) return false;

        if (!query) return true;
        const haystack = [
          item.referenceNumber,
          item.artistName,
          item.artistSchool,
          item.artistEmail,
          item.artTitle,
          item.artDimensions,
          item.artDescription,
        ].join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    function renderFilteredRows() {
      const filtered = applyFilters(allSubmissions);
      renderRows(filtered);
      if (currentToken) {
        setStatus(`Showing ${filtered.length} of ${allSubmissions.length} submissions.`, 'success');
      }
    }

    function renderRows(submissions) {
      if (!Array.isArray(submissions) || submissions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="16">No submissions found.</td></tr>';
        return;
      }

      tbody.innerHTML = submissions.map((item) => {
        const submitted = new Date(item.submittedAt);
        const dateLabel = Number.isNaN(submitted.getTime()) ? 'Unknown' : submitted.toLocaleString();
        const safeUrl = encodeURI(String(item.fileUrl || ''));
        const tagLabel = item.finalistTier ? `<span class="submission-badge">${escapeHtml(item.finalistTier)}</span>` : '<small>Not tagged</small>';

        return `
          <tr>
            <td>${escapeHtml(item.referenceNumber)}</td>
            <td>${escapeHtml(dateLabel)}</td>
            <td>${escapeHtml(item.artistName)}</td>
            <td>${escapeHtml(item.artistAge)}</td>
            <td>${escapeHtml(item.artistSchool)}</td>
            <td>${escapeHtml(item.artistEmail)}</td>
            <td>${escapeHtml(item.artTitle)}</td>
            <td>${escapeHtml(item.artDimensions)}</td>
            <td>${item.is3D ? 'Yes' : 'No'}</td>
            <td>${item.isAIGenerated ? 'Yes' : 'No'}</td>
            <td>${escapeHtml(item.artDescription)}</td>
            <td>${escapeHtml(item.voteCount)}</td>
            <td>
              ${tagLabel}
              <div class="admin-tag-controls">
                <button type="button" class="btn btn-secondary admin-tag-btn" data-action="finalist" data-id="${item.id}">Finalist</button>
                <button type="button" class="btn btn-secondary admin-tag-btn" data-action="winner" data-id="${item.id}">Winner</button>
                <button type="button" class="btn btn-secondary admin-tag-btn" data-action="clear" data-id="${item.id}">Clear</button>
                <button type="button" class="btn btn-danger admin-delete-btn" data-id="${item.id}">Delete</button>
              </div>
            </td>
            <td>${escapeHtml(item.originalFilename)}</td>
            <td>${escapeHtml(item.fileType)}</td>
            <td><a href="${safeUrl}" target="_blank" rel="noopener">Open</a></td>
          </tr>
        `;
      }).join('');
    }

    async function loadSubmissions() {
      if (!currentToken) {
        setStatus('Enter your admin token first.', 'error');
        return;
      }

      loadBtn.disabled = true;
      setStatus('Loading submissions...');

      try {
        const sortBy = sortByInput ? sortByInput.value : 'submitted';
        const sortDir = sortDirInput ? sortDirInput.value : 'desc';
        const response = await fetch(`/api/admin/submissions?sortBy=${encodeURIComponent(sortBy)}&sortDir=${encodeURIComponent(sortDir)}`, {
          headers: {
            'x-admin-token': currentToken,
          },
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Could not load submissions.');
        }

        allSubmissions = Array.isArray(payload.submissions) ? payload.submissions : [];
        renderFilteredRows();
      } catch (error) {
        allSubmissions = [];
        renderRows([]);
        setStatus(error.message || 'Failed to load submissions.', 'error');
      } finally {
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener('click', async () => {
      currentToken = tokenInput.value.trim();
      await loadSubmissions();
    });

    if (sortByInput) {
      sortByInput.addEventListener('change', async () => {
        if (!currentToken) return;
        await loadSubmissions();
      });
    }

    if (sortDirInput) {
      sortDirInput.addEventListener('change', async () => {
        if (!currentToken) return;
        await loadSubmissions();
      });
    }

    if (filterTextInput) {
      filterTextInput.addEventListener('input', () => {
        renderFilteredRows();
      });
    }

    if (filterTagInput) {
      filterTagInput.addEventListener('change', () => {
        renderFilteredRows();
      });
    }

    if (filterMediumInput) {
      filterMediumInput.addEventListener('change', () => {
        renderFilteredRows();
      });
    }

    exportBtn.addEventListener('click', () => {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus('Enter your admin token first.', 'error');
        return;
      }

      window.location.href = `/api/admin/submissions.csv?token=${encodeURIComponent(token)}`;
    });

    tbody.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const isTagAction = target.classList.contains('admin-tag-btn');
      const isDeleteAction = target.classList.contains('admin-delete-btn');
      if (!isTagAction && !isDeleteAction) return;

      const submissionId = Number.parseInt(target.dataset.id || '', 10);
      const action = target.dataset.action || '';
      if (!Number.isInteger(submissionId)) return;

      currentToken = tokenInput.value.trim();
      if (!currentToken) {
        setStatus('Enter your admin token first.', 'error');
        return;
      }

      target.disabled = true;
      try {
        if (isDeleteAction) {
          const confirmed = window.confirm(`Delete submission ${submissionId}? This cannot be undone.`);
          if (!confirmed) return;
          const response = await fetch(`/api/admin/submissions/${submissionId}`, {
            method: 'DELETE',
            headers: { 'x-admin-token': currentToken },
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Could not delete submission.');
        } else if (action === 'clear') {
          const response = await fetch(`/api/admin/finalists/${submissionId}`, {
            method: 'DELETE',
            headers: { 'x-admin-token': currentToken },
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Could not clear tag.');
        } else {
          const tier = action === 'winner' ? 'Winner' : 'Finalist';
          const response = await fetch('/api/admin/finalists', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-admin-token': currentToken,
            },
            body: JSON.stringify({ submissionId, tier }),
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Could not update tag.');
        }

        await loadSubmissions();
      } catch (error) {
        setStatus(error.message || 'Admin action failed.', 'error');
      } finally {
        target.disabled = false;
      }
    });
  </script>
</body>
</html>
